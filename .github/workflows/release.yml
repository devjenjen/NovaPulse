name: Build and Release EXE

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install -r requirements.txt

      - name: Inject Version from Tag
        run: |
          $tag = "${{ github.ref_name }}"
          $cleanTag = $tag.TrimStart('v')
          
          # 1. Update Python code
          (Get-Content novapulse.pyw) -replace 'VERSION\s*=\s*".*"', "VERSION     = `"$tag`"" | Set-Content novapulse.pyw
          
          # 2. Update README.md badge (supports vX.X.X or X.X.X)
          (Get-Content README.md) -replace 'Version-v?\d+\.\d+\.\d+[^-\s]*', "Version-$tag" | Set-Content README.md
          
          # 3. Update setup.iss (Inno Setup)
          (Get-Content setup.iss) -replace '#define AppVersion\s*".*"', "#define AppVersion   `"$cleanTag`"" | Set-Content setup.iss
        shell: powershell

      - name: Build Executable
        run: |
          pyinstaller --noconsole --onefile --icon=assets/icon.ico --name "NovaPulse" novapulse.pyw

      - name: Build Installer (Inno Setup)
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" setup.iss
        shell: powershell

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/NovaPulse.exe
            dist/installer/*.exe
          prerelease: true
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
